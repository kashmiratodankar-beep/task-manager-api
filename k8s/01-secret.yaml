# NOTE: Do not commit real credentials to Git.
# Fill these in locally, or create the secret imperatively instead:
#   kubectl create secret generic task-db-secret -n task-api \
#     --from-literal=DB_HOST=<your-rds-endpoint> \
#     --from-literal=DB_PORT=5432 \
#     --from-literal=DB_NAME=taskdb \
#     --from-literal=DB_USER=taskuser \
#     --from-literal=DB_PASSWORD=<your-password>
apiVersion: v1
kind: Secret
metadata:
  name: task-db-secret
  namespace: task-api
type: Opaque
stringData:
  DB_HOST: "REPLACE_WITH_RDS_ENDPOINT"
  DB_PORT: "5432"
  DB_NAME: "taskdb"
  DB_USER: "taskuser"
  DB_PASSWORD: "REPLACE_WITH_PASSWORD"
